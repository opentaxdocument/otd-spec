# ════════════════════════════════════════════════════════════════════════════
# Tax Year: 2025
# OPEN TAX DOCUMENT — SCHEDULE K-3 (FORM 1065) TAXONOMY
# Version: 2025.1.0
# Derived From: Partner's Instructions for Schedule K-3 (Form 1065) (2025)
# License: CC BY 4.0
# Authors: Tom O'Sullivan, Second Wind
# Date: 2026-04-02
# ════════════════════════════════════════════════════════════════════════════
#
# This taxonomy defines the complete structural blueprint for Schedule K-3
# (Form 1065) — the international supplement to Schedule K-1.
#
# K-3 is the most structurally complex form in the U.S. partnership tax
# system. It contains 13 Parts spanning:
#   - Coded scalar boxes (Part I)
#   - Multi-dimensional grids with country-code iteration (Parts II, X)
#   - Apportionment factor tables (Parts III, IV)
#   - Variable-length entity recordsets (Parts V, VI, VII)
#   - Deemed-paid credit grids (Part VIII)
#   - BEAT payment matrices (Part IX)
#   - Covered partnership and QDD data (Parts XI, XII)
#   - Deemed sale character tables (Part XIII)
#
# OTD Primitives Exercised:
#   scalar    → Part I boxes, Part IV DEI lines, Part IX applicability
#   coded     → Part I (boxes with attachments and code qualifiers)
#   grid      → Parts II, III, IV, VIII, IX, X, XIII
#   recordset → Parts V, VI, VII, XI, XII
#   statement → Attachments to Part I boxes (splitter arrangements, etc.)
#   reference → Cross-references to Forms 5471, 8865, 1116, 1118, 8993, 8991
#
# DESIGN NOTE: Country Code Dimension
#   Parts II and X feature a "country code" dimension that creates
#   effectively 3D grids (line × source category × country). In OTD,
#   this is modeled as a grid where each cell may be a scalar OR an
#   array of {country_code, amount} pairs. See the GRID CELL TYPED-
#   OBJECT RULE in the core spec (otd-spec-v0.2.yaml §2.4).
# ════════════════════════════════════════════════════════════════════════════

taxonomy:
  id: "irs-k3-1065-2025"
  version: "2025.1.0"
  form_id: "k3-1065"
  title: "Schedule K-3 (Form 1065) — Partner's Share of Income, Deductions, Credits, etc. — International"
  source: "Partner's Instructions for Schedule K-3 (Form 1065), 2025"
  tax_year: 2025
  issuing_authority: "Internal Revenue Service"
  parent_form: "k1-1065"
  cross_reference_from: "k1-1065 Part III Box 16"

  change_log:
    - version: "2025.1.0"
      date: "2026-04-02"
      changes:
        - "Initial derivation from 2025 IRS instructions"
        - "P.L. 119-21 (One Big Beautiful Bill Act): §250 exclusion for intangible property dispositions (Part IV, Section 1)"
        - "Part X, Section 1: Lines 15-16, 19-20 revised for other gain/income types"

  # ════════════════════════════════════════════════════════════════════════
  # IDENTIFYING INFORMATION
  # ════════════════════════════════════════════════════════════════════════

  identifying_information:
    title: "Schedule K-3 Identifying Information"
    children:
      partnership_name:
        type: scalar
        semantic_id: "k3.partnership.name"
        label: "Partnership's name"
        value_type: string
        form_location: "Header"
      partnership_ein:
        type: scalar
        semantic_id: "k3.partnership.ein"
        label: "Partnership's EIN"
        value_type: string
        form_location: "Header, Item A"
      partner_name:
        type: scalar
        semantic_id: "k3.partner.name"
        label: "Partner's name"
        value_type: string
        form_location: "Header"
      partner_ssn_tin:
        type: scalar
        semantic_id: "k3.partner.ssn_tin"
        label: "Partner's SSN or TIN"
        value_type: string
        form_location: "Header, Item C"
      part_applicability:
        type: scalar
        semantic_id: "k3.part_applicability"
        label: "Item E — Part applicability"
        description: "Yes/No indicator for each of the 13 Parts"
        value_type: object
        form_location: "Item E"
        fields:
          part_i: { type: boolean, label: "Part I applicable" }
          part_ii: { type: boolean, label: "Part II applicable" }
          part_iii: { type: boolean, label: "Part III applicable" }
          part_iv: { type: boolean, label: "Part IV applicable" }
          part_v: { type: boolean, label: "Part V applicable" }
          part_vi: { type: boolean, label: "Part VI applicable" }
          part_vii: { type: boolean, label: "Part VII applicable" }
          part_viii: { type: boolean, label: "Part VIII applicable" }
          part_ix: { type: boolean, label: "Part IX applicable" }
          part_x: { type: boolean, label: "Part X applicable" }
          part_xi: { type: boolean, label: "Part XI applicable" }
          part_xii: { type: boolean, label: "Part XII applicable" }
          part_xiii: { type: boolean, label: "Part XIII applicable" }

  # ════════════════════════════════════════════════════════════════════════
  # PART I — Other Current Year International Information
  # OTD Primitive: CODED (boxes with statement attachments)
  # ════════════════════════════════════════════════════════════════════════

  part_i:
    title: "Part I — Partner's Share of Partnership's Other Current Year International Information"
    type: coded
    semantic_id: "k3.part_i"
    form_location: "Part I"
    description: "International tax items not reported elsewhere on K-3"
    children:
      box_1:
        type: scalar
        semantic_id: "k3.part_i.gain_personal_property_sale"
        label: "Gain on personal property sale"
        value_type: decimal
        form_location: "Part I, Box 1"
        box: 1
        description: "Income from sale of nondepreciable personal property — partner determines source under §865"
        may_have_statement: true
      box_2:
        type: scalar
        semantic_id: "k3.part_i.foreign_oil_gas_taxes"
        label: "Foreign oil and gas taxes"
        value_type: decimal
        form_location: "Part I, Box 2"
        box: 2
        description: "Separate FTC limitation under §907(a)"
        may_have_statement: true
        cross_references: ["Form 1118, Schedule I"]
      box_3:
        type: scalar
        semantic_id: "k3.part_i.splitter_arrangements"
        label: "Splitter arrangements"
        value_type: boolean
        form_location: "Part I, Box 3"
        box: 3
        description: "§909 suspended taxes from foreign tax credit splitting events"
        may_have_statement: true
      box_4:
        type: scalar
        semantic_id: "k3.part_i.foreign_tax_translation"
        label: "Foreign tax translation"
        value_type: boolean
        form_location: "Part I, Box 4"
        box: 4
        may_have_statement: true
      box_5:
        type: scalar
        semantic_id: "k3.part_i.high_taxed_income"
        label: "High-taxed income"
        value_type: boolean
        form_location: "Part I, Box 5"
        box: 5
        description: "§904(d)(2)(B)(iii) passive income reclassification"
        may_have_statement: true
      box_6:
        type: scalar
        semantic_id: "k3.part_i.section_267a_disallowed"
        label: "Section 267A disallowed deduction"
        value_type: boolean
        form_location: "Part I, Box 6"
        box: 6
        may_have_statement: true
      box_8:
        type: scalar
        semantic_id: "k3.part_i.form_5471_information"
        label: "Form 5471 information"
        value_type: boolean
        form_location: "Part I, Box 8"
        box: 8
        cross_references: ["Form 5471"]
      box_9:
        type: scalar
        semantic_id: "k3.part_i.other_forms"
        label: "Other forms information"
        value_type: boolean
        form_location: "Part I, Box 9"
        box: 9
      box_10:
        type: scalar
        semantic_id: "k3.part_i.partner_loan_transactions"
        label: "Partner loan transactions"
        value_type: boolean
        form_location: "Part I, Box 10"
        box: 10
      box_11:
        type: scalar
        semantic_id: "k3.part_i.dual_consolidated_loss"
        label: "Dual consolidated loss"
        value_type: boolean
        form_location: "Part I, Box 11"
        box: 11
      box_12:
        type: scalar
        semantic_id: "k3.part_i.form_8865_information"
        label: "Form 8865 information"
        value_type: boolean
        form_location: "Part I, Box 12"
        box: 12
        cross_references: ["Form 8865"]
      box_13:
        type: scalar
        semantic_id: "k3.part_i.other_international_items"
        label: "Other international items"
        value_type: boolean
        form_location: "Part I, Box 13"
        box: 13
        may_have_statement: true

  # ════════════════════════════════════════════════════════════════════════
  # PART II — Foreign Tax Credit Limitation
  # OTD Primitive: GRID (the most complex grid in U.S. tax)
  # Dimensions: ~54 lines × 6 source columns × N country codes
  # ════════════════════════════════════════════════════════════════════════

  part_ii:
    title: "Part II — Foreign Tax Credit Limitation"
    type: grid
    semantic_id: "k3.part_ii"
    form_location: "Part II"
    description: "Partner's distributive share of income/loss by source and separate category for FTC limitation"
    cross_references: ["Form 1116", "Form 1118"]

    axes:
      columns:
        - id: "us_source"
          label: "U.S. source"
          form_ref: "Column (a)"
        - id: "foreign_branch"
          label: "Foreign branch category"
          form_ref: "Column (b)"
        - id: "passive"
          label: "Passive category"
          form_ref: "Column (c)"
        - id: "general"
          label: "General category"
          form_ref: "Column (d)"
        - id: "other"
          label: "Other (category code ___)"
          form_ref: "Column (e)"
          note: "Separate category specified by code"
        - id: "sourced_by_partner"
          label: "Sourced by partner"
          form_ref: "Column (f)"
          description: "Partner determines source — e.g., personal property gain under §865"

    country_code_dimension:
      applies_to: ["foreign_branch", "passive", "general", "other"]
      description: >
        Each foreign-source column may contain amounts broken out by
        country code (2-letter ISO 3166-1). This creates a 3D structure:
        line × column × country. In OTD, cells in these columns may be
        either a single decimal (aggregate) or an array of
        {country_code, amount} objects.

    sections:

      section_1_gross_income:
        title: "Section 1 — Gross Income (Lines 1 Through 24)"
        rows:
          - { line: 1,  semantic_id: "k3.ftc.gross.sales", label: "Sales" }
          - { line: 2,  semantic_id: "k3.ftc.gross.services", label: "Gross income from performance of services" }
          - { line: 3,  semantic_id: "k3.ftc.gross.rental_income", label: "Rental income" }
          - { line: 4,  semantic_id: "k3.ftc.gross.royalties", label: "Royalties" }
          - { line: 5,  semantic_id: "k3.ftc.gross.guaranteed_payments", label: "Guaranteed payments" }
          - { line: 6,  semantic_id: "k3.ftc.gross.interest_income", label: "Interest income" }
          - { line: 7,  semantic_id: "k3.ftc.gross.ordinary_dividends", label: "Ordinary dividends" }
          - { line: 8,  semantic_id: "k3.ftc.gross.qualified_dividends", label: "Qualified dividends" }
          - { line: 9,  semantic_id: "k3.ftc.gross.reserved_9", label: "Reserved", reserved: true }
          - { line: 10, semantic_id: "k3.ftc.gross.license_fees", label: "License fees" }
          - { line: 11, semantic_id: "k3.ftc.gross.net_stcg", label: "Net short-term capital gain" }
          - { line: 12, semantic_id: "k3.ftc.gross.net_ltcg", label: "Net long-term capital gain" }
          - { line: 13, semantic_id: "k3.ftc.gross.collectibles_gain", label: "Collectibles (28%) gain" }
          - { line: 14, semantic_id: "k3.ftc.gross.unrecaptured_1250", label: "Unrecaptured section 1250 gain" }
          - { line: 15, semantic_id: "k3.ftc.gross.net_1231_gain", label: "Net section 1231 gain" }
          - { line: 16, semantic_id: "k3.ftc.gross.section_986c", label: "Section 986(c) gain" }
          - { line: 17, semantic_id: "k3.ftc.gross.section_987", label: "Section 987 gain" }
          - { line: 18, semantic_id: "k3.ftc.gross.section_988", label: "Section 988 gain" }
          - { line: 19, semantic_id: "k3.ftc.gross.reserved_19", label: "Reserved", reserved: true }
          - { line: 20, semantic_id: "k3.ftc.gross.other_income", label: "Other income" }
          - { line: 21, semantic_id: "k3.ftc.gross.reserved_21", label: "Reserved", reserved: true }
          - { line: 22, semantic_id: "k3.ftc.gross.reserved_22", label: "Reserved", reserved: true }
          - { line: 23, semantic_id: "k3.ftc.gross.reserved_23", label: "Reserved", reserved: true }
          - { line: 24, semantic_id: "k3.ftc.gross.total", label: "Total gross income", is_total: true }

      section_2_deductions:
        title: "Section 2 — Deductions (Lines 25 Through 54)"
        rows:
          - { line: 25, semantic_id: "k3.ftc.ded.sales_expenses", label: "Expenses allocable to sales income" }
          - { line: 26, semantic_id: "k3.ftc.ded.services_expenses", label: "Expenses allocable to services income" }
          - { line: 27, semantic_id: "k3.ftc.ded.net_stcl", label: "Net short-term capital loss" }
          - { line: 28, semantic_id: "k3.ftc.ded.net_ltcl", label: "Net long-term capital loss" }
          - { line: 29, semantic_id: "k3.ftc.ded.collectibles_loss", label: "Collectibles (28%) loss" }
          - { line: 30, semantic_id: "k3.ftc.ded.net_1231_loss", label: "Net section 1231 loss" }
          - { line: 31, semantic_id: "k3.ftc.ded.other_deductions_1", label: "Other deductions — allocable" }
          - { line: 32, semantic_id: "k3.ftc.ded.re_expenses", label: "Research & experimental (R&E) expenses", cross_references: ["Part III, Section 1"] }
          - { line: 33, semantic_id: "k3.ftc.ded.rental_royalty_dda", label: "Rental/royalty/licensing — depreciation, depletion, amortization" }
          - { line: 34, semantic_id: "k3.ftc.ded.rental_royalty_other", label: "Rental/royalty/licensing — other" }
          - { line: 35, semantic_id: "k3.ftc.ded.license_dda", label: "Licensing — depreciation, depletion, amortization" }
          - { line: 36, semantic_id: "k3.ftc.ded.license_other", label: "Licensing — other" }
          - { line: 37, semantic_id: "k3.ftc.ded.other_deductions_2", label: "Other deductions — apportioned" }
          - { line: 38, semantic_id: "k3.ftc.ded.charitable", label: "Charitable contributions" }
          - { line: 39, semantic_id: "k3.ftc.ded.interest_861_10e", label: "Interest expense — Reg §1.861-10(e)" }
          - { line: 40, semantic_id: "k3.ftc.ded.interest_861_10t", label: "Interest expense — Temp Reg §1.861-10T" }
          - { line: 41, semantic_id: "k3.ftc.ded.interest_asset_method", label: "Other interest expense — asset method" }
          - { line: 42, semantic_id: "k3.ftc.ded.interest_modified_gross", label: "Other interest expense — modified gross income method" }
          - { line: 43, semantic_id: "k3.ftc.ded.interest_other", label: "Other interest expense — other" }
          - { line: 44, semantic_id: "k3.ftc.ded.other_deductions_3", label: "Other deductions — other" }
          - { line: 45, semantic_id: "k3.ftc.ded.foreign_taxes_deductible", label: "Foreign taxes — not creditable but deductible" }
          - { line: 46, semantic_id: "k3.ftc.ded.section_986c_loss", label: "Section 986(c) loss" }
          - { line: 47, semantic_id: "k3.ftc.ded.section_987_loss", label: "Section 987 loss" }
          - { line: 48, semantic_id: "k3.ftc.ded.section_988_loss", label: "Section 988 loss" }
          - { line: 49, semantic_id: "k3.ftc.ded.other_allocable", label: "Other allocable deductions" }
          - { line: 50, semantic_id: "k3.ftc.ded.other_apportioned", label: "Other apportioned share of deductions" }
          - { line: 51, semantic_id: "k3.ftc.ded.reserved_51", label: "Reserved", reserved: true }
          - { line: 52, semantic_id: "k3.ftc.ded.reserved_52", label: "Reserved", reserved: true }
          - { line: 53, semantic_id: "k3.ftc.ded.reserved_53", label: "Reserved", reserved: true }
          - { line: 54, semantic_id: "k3.ftc.ded.total", label: "Total deductions", is_total: true }

  # ════════════════════════════════════════════════════════════════════════
  # PART III — Other Information for Form 1116 or 1118
  # OTD Primitive: HYBRID (5 sections mixing grid and scalar)
  # ════════════════════════════════════════════════════════════════════════

  part_iii:
    title: "Part III — Other Information for Preparation of Form 1116 or 1118"
    semantic_id: "k3.part_iii"
    form_location: "Part III"
    cross_references: ["Form 1116", "Form 1118"]

    sections:

      section_1_re_apportionment:
        title: "Section 1 — R&E Expenses Apportionment Factors"
        type: grid
        semantic_id: "k3.part_iii.s1"
        rows:
          - { line: 1, semantic_id: "k3.re_apportionment.gross_receipts_by_sic", label: "Gross receipts by SIC code", note: "SIC code as row key" }
          - { line: 2, semantic_id: "k3.re_apportionment.exclusive_apportionment", label: "Exclusive apportionment — total R&E on Part II line 32" }

      section_2_interest_apportionment:
        title: "Section 2 — Interest Expense Apportionment Factors"
        type: grid
        semantic_id: "k3.part_iii.s2"
        rows:
          - { line: 3, semantic_id: "k3.interest_apportionment.directly_allocable_861_10e", label: "Assets — directly allocable interest under Reg §1.861-10(e)" }
          - { line: 4, semantic_id: "k3.interest_apportionment.directly_allocable_861_10t", label: "Assets — directly allocable interest under Temp Reg §1.861-10T" }
          - { line: 5, semantic_id: "k3.interest_apportionment.excluded_assets", label: "Assets excluded from apportionment formula" }
          - { line: 6, semantic_id: "k3.interest_apportionment.total_assets", label: "Total assets used for apportionment" }
          - { line: 7, semantic_id: "k3.interest_apportionment.stock_10pct_noncontrolled", label: "Basis in stock of 10%-owned noncontrolled foreign corps" }
          - { line: 8, semantic_id: "k3.interest_apportionment.stock_cfcs", label: "Basis in stock of CFCs" }

      section_3_fdii_apportionment:
        title: "Section 3 — FDII Deduction Apportionment Factors"
        type: scalar
        semantic_id: "k3.part_iii.s3"
        description: "Factors for §250 FDII deduction apportionment"

      section_4_foreign_taxes:
        title: "Section 4 — Foreign Taxes"
        type: grid
        semantic_id: "k3.part_iii.s4"
        description: "Direct foreign taxes, reductions, and redeterminations"
        rows:
          - { line: 1, semantic_id: "k3.foreign_taxes.direct_901_903", label: "Direct (§901 or §903) foreign taxes" }
          - { line: 2, semantic_id: "k3.foreign_taxes.reduction_total", label: "Reduction of taxes (total)" }
          - { line: 3, semantic_id: "k3.foreign_taxes.redeterminations", label: "Foreign tax redeterminations" }
        sub_lines_for_line_2:
          - { sub: "A", semantic_id: "k3.foreign_taxes.reduction.taxes_on_excluded_income", label: "Taxes on excluded income" }
          - { sub: "B", semantic_id: "k3.foreign_taxes.reduction.taxes_on_section_901j", label: "Taxes on §901(j) income" }
          - { sub: "C", semantic_id: "k3.foreign_taxes.reduction.taxes_on_section_901k", label: "Taxes on §901(k) distributions" }
          - { sub: "D", semantic_id: "k3.foreign_taxes.reduction.taxes_on_section_901l", label: "Taxes on §901(l) income" }
          - { sub: "E", semantic_id: "k3.foreign_taxes.reduction.taxes_suspended_section_909", label: "Taxes suspended under §909" }
          - { sub: "F", semantic_id: "k3.foreign_taxes.reduction.other_reductions", label: "Other reductions" }

      section_5_other_tax_info:
        title: "Section 5 — Other Tax Information"
        type: scalar
        semantic_id: "k3.part_iii.s5"
        description: "Section 743(b) adjustments by source and separate category"

  # ════════════════════════════════════════════════════════════════════════
  # PART IV — §250 FDII Deduction
  # OTD Primitive: HYBRID (3 sections: scalar + grid)
  # ════════════════════════════════════════════════════════════════════════

  part_iv:
    title: "Part IV — Information on Partner's Section 250 Deduction With Respect to FDII"
    semantic_id: "k3.part_iv"
    form_location: "Part IV"
    cross_references: ["Form 8993"]

    sections:

      section_1_dei_qbai:
        title: "Section 1 — DEI and QBAI on Form 8993"
        type: grid
        semantic_id: "k3.part_iv.s1"
        note: "P.L. 119-21 added lines 3a/3b for intangible property dispositions after 6/16/2025"
        rows:
          - { line: 1, semantic_id: "k3.fdii.gross_dei", label: "Gross DEI" }
          - { line: 2, semantic_id: "k3.fdii.gross_fddei", label: "Gross FDDEI" }
          - { line: "3a", semantic_id: "k3.fdii.intangible_property_exclusion", label: "Income from disposition of intangible property — §250(b)(3)(A)(i)(VII)(aa)" }
          - { line: "3b", semantic_id: "k3.fdii.other_depreciable_exclusion", label: "Income from disposition of other depreciable property — §250(b)(3)(A)(i)(VII)(bb)" }
          - { line: 4, semantic_id: "k3.fdii.allocable_deductions", label: "Allocable deductions" }
          - { line: 5, semantic_id: "k3.fdii.interest_deductions", label: "Interest deductions" }
          - { line: 6, semantic_id: "k3.fdii.re_deductions", label: "R&E deductions" }
          - { line: 7, semantic_id: "k3.fdii.other_deductions", label: "Other deductions" }
          - { line: 8, semantic_id: "k3.fdii.partnership_qbai", label: "Partnership QBAI" }

      section_2_fddei:
        title: "Section 2 — FDDEI on Form 8993"
        type: grid
        semantic_id: "k3.part_iv.s2"
        rows:
          - { line: 9, semantic_id: "k3.fddei.gross_receipts", label: "Gross receipts" }
          - { line: 10, semantic_id: "k3.fddei.cogs", label: "COGS" }
          - { line: 11, semantic_id: "k3.fddei.allocable_deductions", label: "Allocable deductions" }
          - { line: 12, semantic_id: "k3.fddei.other_apportioned", label: "Other apportioned deductions" }

      section_3_other_8993:
        title: "Section 3 — Other Information for Form 8993"
        semantic_id: "k3.part_iv.s3"
        subsections:
          interest_expense:
            rows:
              - { line: "13A", semantic_id: "k3.fdii_interest.directly_allocable_861_10e", label: "Interest — Reg §1.861-10(e)" }
              - { line: "13B", semantic_id: "k3.fdii_interest.directly_allocable_861_10t", label: "Interest — Temp Reg §1.861-10T" }
              - { line: "13C", semantic_id: "k3.fdii_interest.other", label: "Other interest expense" }
            apportionment:
              - { line: 14, semantic_id: "k3.fdii_interest.apportionment_factors", label: "Interest expense apportionment factors" }
          re_expenses:
            rows:
              - { line: 15, semantic_id: "k3.fdii_re.gross_receipts_by_sic", label: "Gross receipts by SIC code" }
              - { line: 16, semantic_id: "k3.fdii_re.re_expenses_by_sic", label: "R&E expenses by SIC code" }

  # ════════════════════════════════════════════════════════════════════════
  # PART V — Distributions From Foreign Corporations to Partnership
  # OTD Primitive: RECORDSET (one row per CFC distribution)
