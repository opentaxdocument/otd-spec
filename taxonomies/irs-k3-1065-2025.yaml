  # VALIDATION CONSTRAINTS
  # ════════════════════════════════════════════════════════════════════════

  validation_constraints:
    - id: "part_ii_line_24_total"
      description: "Part II, Line 24 must equal sum of Lines 1-23 for each column"
      severity: error
      expression: "line_24 == sum(lines_1_through_23) per column"
    - id: "part_ii_line_54_total"
      description: "Part II, Line 54 must equal sum of Lines 25-53 for each column"
      severity: error
      expression: "line_54 == sum(lines_25_through_53) per column"
    - id: "part_applicability_consistency"
      description: "If Part data is present, corresponding part_applicability flag must be true"
      severity: warning
      expression: "for each part with data: part_applicability[part] == true"
    - id: "part_v_ptep_sum"
      description: "Sum of PTEP groups + non_ptep must equal total distribution"
      severity: warning
      expression: "sum(ptep_groups) + non_ptep == total_distribution_usd"
    - id: "part_ix_line_17_total"
      description: "Part IX, Section 2, Line 17 = sum of Lines 6-16, Column (b)"
      severity: error
      expression: "line_17_col_b == sum(lines_6_through_16_col_b)"
    - id: "part_ix_line_19_total"
      description: "Part IX, Section 2, Line 19 = sum of Lines 6-16, Column (c)"
      severity: error
      expression: "line_19_col_c == sum(lines_6_through_16_col_c)"
    - id: "part_x_s1_line_21_total"
      description: "Part X, Section 1, Line 21 = sum of Lines 1-20 per column"
      severity: error
      expression: "line_21 == sum(lines_1_through_20) per column"
    - id: "part_x_s2_line_18_net"
      description: "Part X, Section 2, Line 18 = Section 1 Line 21 - Section 2 Line 17"
      severity: error
      expression: "line_18 == section_1_line_21 - section_2_line_17"
    - id: "country_codes_valid"
      description: "All country codes must be valid ISO 3166-1 alpha-2"
      severity: error
      expression: "all country_code values in ISO_3166_1_alpha_2"
    - id: "ein_format"
      description: "All EINs must match XX-XXXXXXX format (or redacted pattern)"
      severity: warning
      expression: "ein matches /^\\d{2}-\\d{7}$/ or /^XX-XXXX\\d{3}$/"
