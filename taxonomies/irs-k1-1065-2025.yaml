# STAGE 6 — Validation Constraints
# ────────────────────────────────────────────────────────────────────────────

constraints:

  - id: "box_4c_equals_4a_plus_4b"
    type: "sum"
    target: "part_iii.box_4c"
    operands:
      - "part_iii.box_4a"
      - "part_iii.box_4b"
    tolerance: 0.01
    severity: "error"
    source: "Box 4c is the total of boxes 4a and 4b"

  - id: "box_6b_lte_6a"
    type: "range"
    target: "part_iii.box_6b"
    rule: "value <= part_iii.box_6a.value"
    severity: "error"
    source: "Qualified dividends cannot exceed ordinary dividends"

  - id: "box_20_zz_requires_classification"
    type: "required_field"
    target: "part_iii.box_20.ZZ.semantic.classification"
    condition: "when code is ZZ and node is present"
    severity: "error"
    source: "OTD specification §2.3"

  - id: "box_11_zz_requires_classification"
    type: "required_field"
    target: "part_iii.box_11.ZZ.semantic.classification"
    condition: "when code is ZZ and node is present"
    severity: "error"
    source: "OTD specification §2.3"

  - id: "box_13_zz_requires_classification"
    type: "required_field"
    target: "part_iii.box_13.ZZ.semantic.classification"
    condition: "when code is ZZ and node is present"
    severity: "error"
    source: "OTD specification §2.3"

  - id: "box_15_zz_requires_classification"
    type: "required_field"
    target: "part_iii.box_15.ZZ.semantic.classification"
    condition: "when code is ZZ and node is present"
    severity: "error"
    source: "OTD specification §2.3"

  - id: "capital_account_continuity"
    type: "sum"
    target: "part_ii.item_l.ending"
    operands:
      - "part_ii.item_l.beginning"
      - "part_ii.item_l.contributions"
      - "part_ii.item_l.current_year_increase_decrease"
      - "part_ii.item_l.other_increase_decrease"
      - "part_ii.item_l.withdrawals"
    tolerance: 1.00
    severity: "warning"
    source: "Capital account ending = beginning + contributions + income + other +/- withdrawals"

  - id: "percentages_valid_range"
    type: "range"
    target: "part_ii.item_j.*"
    rule: "value >= 0 and value <= 1"
    severity: "error"
    source: "Partnership share percentages must be between 0% and 100%"

  - id: "liabilities_non_negative"
    type: "range"
    target: "part_ii.item_k1.*"
    rule: "value >= 0"
    severity: "warning"
    source: "Liability shares should be non-negative"

