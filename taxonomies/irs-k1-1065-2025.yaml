# MeF Tag Convention:
# Each taxonomy node MAY include a `mef_tag` attribute mapping it to the
# official IRS Modernized e-File (MeF) XML schema tag name. This bridges
# OTD's human-readable semantic IDs with the government's CamelCase standard,
# lowering integration cost for vendors already implementing MeF XML.
#
# MeF tag reference: IRS MeF XML schema for Form 1065, Schedule K-1
# https://www.irs.gov/e-file-providers/modernized-e-file-mef-xml-schema
#
# Example mapping (from Box 1):
#   semantic_id: "ordinary_business_income"
#   mef_tag:     "OrdinaryBusinessIncomeLossAmt"
#
# Where mef_tag is absent, no direct MeF mapping has been confirmed.
# Implementers should consult the MeF schema directly.

change_log:
  - version: "2025.1.0"
    date: "2025-01-01"
    changes:
      - "Box 13, Code X: Expanded to include qualified sound recording production expenses (P.L. 119-21)"
      - "Box 19: Distribution codes separated by category with new Codes E, F, G"
      - "Box 20, Code ZZ: Added section 1062 gain from sale of qualified farmland property to qualified farmers"
      - "Form 7217: New requirement for partners receiving property distributions (beginning TY2024)"

